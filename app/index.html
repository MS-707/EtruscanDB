<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EtruscanDB — Archaeological Research Explorer</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a26;
            --bg-card: #16161f;
            --text-primary: #e8e6e3;
            --text-secondary: #9b9898;
            --text-muted: #6b6868;
            --accent: #c67b4e;
            --accent-dim: #8b5633;
            --accent-glow: rgba(198, 123, 78, 0.15);
            --border: #2a2a35;
            --border-subtle: #1f1f2a;
            --type-site: #6ea87f;
            --type-collection: #7e8ec6;
            --type-artifact: #c6a24e;
            --font-body: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            --font-display: 'Cormorant Garamond', Georgia, serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }
        .app {
            display: grid;
            grid-template-rows: auto 1fr;
            grid-template-columns: 340px 1fr;
            height: 100vh;
        }
        .header {
            grid-column: 1 / -1;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .logo {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.02em;
        }
        .logo span {
            color: var(--text-muted);
            font-weight: 400;
            font-size: 0.9rem;
            margin-left: 4px;
        }
        .header-stats {
            display: flex;
            gap: 20px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .stat-item { display: flex; align-items: center; gap: 6px; }
        .stat-dot { width: 8px; height: 8px; border-radius: 50%; }
        .stat-dot.site { background: var(--type-site); }
        .stat-dot.collection { background: var(--type-collection); }
        .stat-dot.artifact { background: var(--type-artifact); }

        .sidebar {
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .search-bar {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }
        .search-input {
            width: 100%;
            padding: 8px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.85rem;
            font-family: var(--font-body);
            outline: none;
            transition: border-color 0.2s;
        }
        .search-input:focus { border-color: var(--accent-dim); }
        .search-input::placeholder { color: var(--text-muted); }

        .filters {
            padding: 8px 16px;
            display: flex;
            gap: 6px;
            border-bottom: 1px solid var(--border);
        }
        .filter-btn {
            padding: 4px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-family: var(--font-body);
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn:hover { border-color: var(--accent-dim); color: var(--text-primary); }
        .filter-btn.active {
            background: var(--accent-glow);
            border-color: var(--accent);
            color: var(--accent);
        }
        .sidebar-count {
            padding: 6px 16px;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border-subtle);
        }
        .record-list {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        .record-item {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-subtle);
            cursor: pointer;
            transition: background 0.15s;
        }
        .record-item:hover { background: var(--bg-tertiary); }
        .record-item.active {
            background: var(--accent-glow);
            border-left: 3px solid var(--accent);
        }
        .record-name {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 2px;
            color: var(--text-primary);
        }
        .record-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .type-badge {
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }
        .type-badge.site { background: rgba(110,168,127,0.15); color: var(--type-site); }
        .type-badge.collection { background: rgba(126,142,198,0.15); color: var(--type-collection); }
        .type-badge.artifact { background: rgba(198,162,78,0.15); color: var(--type-artifact); }

        .map-container { position: relative; }
        #map { width: 100%; height: 100%; }

        /* Detail panel */
        .detail-panel {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 380px;
            max-height: calc(100% - 32px);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            display: none;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        .detail-panel.visible { display: block; }
        .detail-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 28px;
            height: 28px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            z-index: 1001;
            transition: all 0.2s;
        }
        .detail-close:hover { background: var(--accent-dim); color: var(--text-primary); }
        .detail-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 12px 12px 0 0;
        }
        .detail-image-placeholder {
            width: 100%;
            height: 120px;
            background: linear-gradient(135deg, var(--bg-tertiary), var(--bg-primary));
            border-radius: 12px 12px 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 2rem;
        }
        .detail-body { padding: 20px; }
        .detail-title {
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.3;
        }
        .detail-subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .detail-description {
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }
        .detail-fields {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 6px 12px;
            font-size: 0.8rem;
        }
        .detail-field-label {
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.05em;
            padding-top: 2px;
        }
        .detail-field-value { color: var(--text-secondary); }
        .detail-field-value a { color: var(--accent); text-decoration: none; }
        .detail-field-value a:hover { text-decoration: underline; }

        /* Leaflet overrides */
        .leaflet-container { background: var(--bg-primary) !important; font-family: var(--font-body) !important; }
        .leaflet-popup-content-wrapper {
            background: var(--bg-card) !important;
            color: var(--text-primary) !important;
            border-radius: 8px !important;
            border: 1px solid var(--border) !important;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3) !important;
        }
        .leaflet-popup-tip { background: var(--bg-card) !important; }
        .leaflet-popup-close-button { color: var(--text-muted) !important; }
        .leaflet-control-zoom a {
            background: var(--bg-card) !important;
            color: var(--text-primary) !important;
            border-color: var(--border) !important;
        }
        .leaflet-control-attribution {
            background: rgba(10,10,15,0.7) !important;
            color: var(--text-muted) !important;
            font-size: 0.65rem !important;
        }
        .leaflet-control-attribution a { color: var(--text-muted) !important; }

        .popup-title {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 4px;
        }
        .popup-meta { font-size: 0.75rem; color: var(--text-muted); }

        @media (max-width: 768px) {
            .app {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto 1fr;
            }
            .sidebar {
                max-height: 40vh;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
            .detail-panel { width: calc(100% - 32px); }
            .header-stats { display: none; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-left">
                <div class="logo">EtruscanDB <span>Archaeological Research Explorer</span></div>
            </div>
            <div class="header-stats">
                <div class="stat-item"><div class="stat-dot site"></div><span id="site-count">0</span> Sites</div>
                <div class="stat-item"><div class="stat-dot collection"></div><span id="collection-count">0</span> Collections</div>
                <div class="stat-item"><div class="stat-dot artifact"></div><span id="artifact-count">0</span> Artifacts</div>
            </div>
        </header>

        <aside class="sidebar">
            <div class="search-bar">
                <input type="text" class="search-input" placeholder="Search sites, artifacts, collections..." id="search">
            </div>
            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="site">Sites</button>
                <button class="filter-btn" data-filter="collection">Collections</button>
                <button class="filter-btn" data-filter="artifact">Artifacts</button>
            </div>
            <div class="sidebar-count" id="sidebar-count">54 records</div>
            <div class="record-list" id="record-list"></div>
        </aside>

        <div class="map-container">
            <div id="map"></div>
            <div class="detail-panel" id="detail-panel">
                <button class="detail-close" id="detail-close">&times;</button>
                <div id="detail-content"></div>
            </div>
        </div>
    </div>

    <script>
        let allRecords = [];
        let filteredRecords = [];
        let markerLayer;
        let activeRecord = null;

        // Leaflet map with dark tiles
        const map = L.map('map', {
            center: [42.5, 12.0],
            zoom: 6,
            zoomControl: true
        });

        // Dark tile layer (CartoDB Dark Matter)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        markerLayer = L.layerGroup().addTo(map);

        // Color map for marker types
        const typeColors = {
            site: '#6ea87f',
            collection: '#7e8ec6',
            artifact: '#c6a24e'
        };

        function createCircleMarker(record) {
            const loc = record.location;
            if (!loc || loc.lat == null || loc.lng == null) return null;

            const marker = L.circleMarker([loc.lat, loc.lng], {
                radius: 7,
                fillColor: typeColors[record.type] || '#c67b4e',
                color: 'rgba(255,255,255,0.8)',
                weight: 2,
                fillOpacity: 0.9
            });

            marker.bindPopup(`
                <div class="popup-title">${record.name}</div>
                <div class="popup-meta">${record.type} · ${record.date_range || record.period || ''}</div>
            `, { className: '' });

            marker.on('click', () => selectRecord(record));
            marker._record = record;
            return marker;
        }

        async function loadData() {
            try {
                const resp = await fetch('data/etruscan_unified.json');
                allRecords = await resp.json();
            } catch (e) {
                console.error('Failed to load data:', e);
                return;
            }

            const counts = { site: 0, collection: 0, artifact: 0 };
            allRecords.forEach(r => counts[r.type] = (counts[r.type] || 0) + 1);
            document.getElementById('site-count').textContent = counts.site;
            document.getElementById('collection-count').textContent = counts.collection;
            document.getElementById('artifact-count').textContent = counts.artifact;

            filteredRecords = [...allRecords];
            renderList();
            renderMarkers();
        }

        function renderList() {
            const container = document.getElementById('record-list');
            container.innerHTML = '';
            document.getElementById('sidebar-count').textContent = `${filteredRecords.length} records`;

            filteredRecords.forEach(record => {
                const item = document.createElement('div');
                item.className = `record-item${activeRecord?.id === record.id ? ' active' : ''}`;

                const locationText = record.location?.modern_name || record.location?.ancient_name || '';
                const periodText = record.date_range || record.period || '';

                item.innerHTML = `
                    <div class="record-name">${record.name}</div>
                    <div class="record-meta">
                        <span class="type-badge ${record.type}">${record.type}</span>
                        ${periodText ? `<span>${periodText}</span>` : ''}
                        ${locationText ? `<span>· ${locationText}</span>` : ''}
                    </div>
                `;

                item.addEventListener('click', () => selectRecord(record));
                container.appendChild(item);
            });
        }

        function renderMarkers() {
            markerLayer.clearLayers();
            filteredRecords.forEach(record => {
                const m = createCircleMarker(record);
                if (m) markerLayer.addLayer(m);
            });
        }

        function selectRecord(record) {
            activeRecord = record;
            renderList();

            if (record.location?.lat != null) {
                map.flyTo([record.location.lat, record.location.lng], Math.max(map.getZoom(), 8), { duration: 0.8 });
            }

            const panel = document.getElementById('detail-panel');
            const content = document.getElementById('detail-content');

            const imageHtml = record.image_url
                ? `<img class="detail-image" src="${record.image_url}" alt="${record.name}" onerror="this.outerHTML='<div class=\\'detail-image-placeholder\\'>🏛</div>'">`
                : `<div class="detail-image-placeholder">${record.type === 'artifact' ? '⚱️' : '🏛'}</div>`;

            const fields = [];
            if (record.period) fields.push(['Period', record.period]);
            if (record.date_range) fields.push(['Date', record.date_range]);
            if (record.medium) fields.push(['Medium', record.medium]);
            if (record.institution) fields.push(['Institution', record.institution]);
            if (record.culture) fields.push(['Culture', record.culture]);
            if (record.category) fields.push(['Category', record.category]);
            if (record.holdings_estimate) fields.push(['Holdings', record.holdings_estimate]);
            if (record.provenance) fields.push(['Provenance', record.provenance]);
            if (record.location?.modern_name) fields.push(['Location', record.location.modern_name]);
            if (record.location?.ancient_name) fields.push(['Ancient Name', record.location.ancient_name]);
            if (record.source_url) fields.push(['Source', `<a href="${record.source_url}" target="_blank" rel="noopener">View →</a>`]);

            const notableHtml = record.notable_objects
                ? `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
                    <div class="detail-field-label" style="margin-bottom:6px">Notable Objects</div>
                    <div style="font-size:0.8rem;color:var(--text-secondary)">${record.notable_objects.join(' · ')}</div>
                   </div>`
                : '';

            content.innerHTML = `
                ${imageHtml}
                <div class="detail-body">
                    <div class="detail-subtitle">
                        <span class="type-badge ${record.type}">${record.type}</span>
                        ${record.date_range || record.period || ''}
                    </div>
                    <div class="detail-title">${record.name}</div>
                    <div class="detail-description">${record.description || ''}</div>
                    <div class="detail-fields">
                        ${fields.map(([l, v]) => `
                            <div class="detail-field-label">${l}</div>
                            <div class="detail-field-value">${v}</div>
                        `).join('')}
                    </div>
                    ${notableHtml}
                </div>
            `;

            panel.classList.add('visible');

            // Scroll sidebar to active item
            const activeEl = document.querySelector('.record-item.active');
            if (activeEl) activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        document.getElementById('detail-close').addEventListener('click', () => {
            document.getElementById('detail-panel').classList.remove('visible');
            activeRecord = null;
            renderList();
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                applyFilters();
            });
        });

        document.getElementById('search').addEventListener('input', applyFilters);

        function applyFilters() {
            const query = document.getElementById('search').value.toLowerCase().trim();
            const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;

            filteredRecords = allRecords.filter(r => {
                const matchesType = activeFilter === 'all' || r.type === activeFilter;
                if (!matchesType) return false;
                if (!query) return true;
                const searchable = [
                    r.name, r.description, r.category, r.period, r.date_range,
                    r.institution, r.culture, r.medium, r.provenance,
                    r.location?.modern_name, r.location?.ancient_name
                ].filter(Boolean).join(' ').toLowerCase();
                return searchable.includes(query);
            });

            renderList();
            renderMarkers();
        }

        loadData();
    </script>
</body>
</html>
